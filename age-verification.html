<!DOCTYPE html>
<html lang="es">
<head>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xemzo0j583");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Edad</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at center, #7a0000 0%, #5a0000 40%, #2b0000 75%, #120000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 600px;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .image-container {
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease;
    }

    .image-container img {
      width: 100%;
      max-width: 300px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border: 4px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .warning-box {
      background: rgba(255, 0, 0, 0.1);
      border: 2px solid #ff4444;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .warning-text {
      font-size: 14px;
      color: #ffcccc;
      line-height: 1.5;
    }

    .warning-text strong {
      color: #ff6666;
      display: block;
      margin-bottom: 5px;
    }

    h1 {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .highlight {
      color: #ff4444;
      font-weight: bold;
    }

    .breve {
      color: #ff4444;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .question {
      font-size: 20px;
      margin-bottom: 40px;
      color: #ddd;
      line-height: 1.6;
    }

    .button-container {
      display: flex;
      gap: 15px;
      flex-direction: column;
    }

    .btn {
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-yes {
      background: linear-gradient(180deg, #ff4444, #cc0000);
      color: #fff;
      box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
      animation: pulse-btn 1.5s infinite;
    }

    .btn-yes:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(255, 68, 68, 0.6);
    }

    @keyframes pulse-btn {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
      }
      50% {
        transform: scale(1.02);
        box-shadow: 0 12px 40px rgba(255, 68, 68, 0.6);
      }
    }

    .btn-no {
      background: rgba(255, 255, 255, 0.2);
      color: #ddd;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-no:hover {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #999;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .question {
        font-size: 18px;
      }

      .btn {
        padding: 14px 24px;
        font-size: 16px;
      }

      .image-container img {
        max-width: 250px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="image-container">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect fill='%23333' width='300' height='300'/%3E%3Ctext x='150' y='150' font-size='40' fill='%23666' text-anchor='middle' dy='.3em'%3E18+%3C/text%3E%3C/svg%3E" alt="18+">
    </div>

    <div class="warning-box">
      <div class="warning-text">
        <strong>⚠️ ADVERTENCIA</strong>
        Este contenido será removido en <span style="color: #ff6666;">BREVE</span>
      </div>
    </div>

    <h1>ESTE CONTENIDO SERÁ REMOVIDO EN</h1>
    <div class="breve">BREVE</div>

    <p class="question">
      ¿Confirmas que tienes <span class="highlight">+18 años</span> para acceder a este secreto?
    </p>

    <div class="button-container">
      <a href="/vsl" class="btn btn-yes">
        ¡VER AHORA!
        <span>→</span>
      </a>
      <button class="btn btn-no" onclick="window.history.back()">
        NO, SALIR
      </button>
    </div>

    <div class="footer">
      <p>© 2026 - Todos los derechos reservados</p>
      <p>Este contenido es solo para mayores de 18 años</p>
    </div>
  </div>

</body>
</html>
