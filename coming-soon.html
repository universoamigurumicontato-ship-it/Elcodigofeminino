<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio en Construcción</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at center, #7a0000 0%, #5a0000 40%, #2b0000 75%, #120000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 600px;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .emoji {
      font-size: 80px;
      margin-bottom: 30px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    p {
      font-size: 20px;
      color: #ddd;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .accent {
      color: #22c55e;
      font-weight: bold;
    }

    .loading {
      margin-top: 40px;
    }

    .spinner {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 4px solid rgba(34, 197, 94, 0.3);
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #999;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      p {
        font-size: 18px;
      }

      .emoji {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji">🚀</div>

    <h1>En Breve</h1>

    <p>
      Sitio en <span class="accent">Construcción</span>
    </p>

    <p>
      Estamos trabajando para traerte lo mejor. Regresa pronto para más contenido.
    </p>

    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 20px; font-size: 16px;">Cargando...</p>
    </div>

    <div class="footer">
      <p>© 2026 - Todos los derechos reservados</p>
    </div>
  </div>

</body>
</html>
